<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    
    <!-- Primary Meta Tags -->
    <meta name="description" content="World-class multi-AI coordination framework proving AGI is an architecture problem, not a compute problem. Comprehensive analysis of the Phoenix Protocol's path to Absolute AGI through architectural supremacy." />
    <meta name="keywords" content="AGI, Artificial General Intelligence, Phoenix Protocol, Multi-AI Coordination, AGI Architecture, Absolute AGI, Machine Learning, AI Framework, Justin Conzet" />

    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="%VITE_APP_TITLE%" />
    <meta property="og:description" content="World-class multi-AI coordination framework proving AGI is an architecture problem, not a compute problem. Explore the path to Absolute AGI." />
    <meta property="og:site_name" content="Phoenix Protocol" />

    <meta property="twitter:title" content="%VITE_APP_TITLE%" />
    <meta property="twitter:description" content="World-class multi-AI coordination framework proving AGI is an architecture problem, not a compute problem." />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#0a0a0a" />
    
    <link rel="icon" type="image/png" href="%VITE_APP_LOGO%" />
    <link rel="apple-touch-icon" href="%VITE_APP_LOGO%" />
    <title>%VITE_APP_TITLE%</title>

    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" as="style" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>

    <div id="root"></div>

    <script
      defer
