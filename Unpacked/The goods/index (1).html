<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ultimate Creative Pack — 50-in-1</title>
<style>
  body { background:#0b0b0f; color:#eaeaea; font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif; margin:0; padding:2rem; }
  .wrap { max-width: 960px; margin: 0 auto; }
  h1 { font-size: 2rem; margin: 0 0 0.25rem 0; }
  p.sub { color:#a8a8b3; margin-top:0.25rem }
  .grid { display:grid; grid-template-columns: repeat(auto-fill,minmax(260px,1fr)); gap:1rem; margin-top:1.5rem; }
  .card { background:#14141b; padding:1rem; border-radius:12px; border:1px solid #242437; }
  .title { font-weight:600; }
  .tag { display:inline-block; font-size:12px; padding:.15rem .5rem; border:1px solid #34344a; border-radius:999px; margin-right:.35rem; margin-top:.35rem; color:#c8c8e0; }
  .cta { display:inline-block; margin-right:.75rem; margin-top:1rem; padding:.6rem 1rem; border-radius:10px; border:1px solid #3a3a55; text-decoration:none; color:#eaeaea }
  .cta:hover { background:#1a1a2b; }
  footer { margin-top:2rem; color:#8b8ba1; font-size:.9rem;}
  code { background:#1a1a2b; padding:.15rem .35rem; border-radius:6px; }
</style>
<body>
<div class="wrap">
  <h1>Ultimate Creative Pack</h1>
  <p class="sub">50 packs · one master library · <code>standard_per_pack $49</code> · <code>bundle $299</code> · <code>studio $899</code></p>
  <div>
    <a class="cta" href="../dist/ultimate-pack-v1.zip">Download Bundle</a>
    <a class="cta" href="../dist/ultimate-pack-lite.zip">Download Lite</a>
    <a class="cta" href="../dist/catalog.json">View Catalog JSON</a>
  </div>
  <div id="grid" class="grid"></div>
  <footer>© Justin Conzet — Sovereign authorship retained.</footer>
</div>
<script>
async function main() {
  const res = await fetch("../dist/catalog.json");
  const catalog = await res.json();
  const grid = document.getElementById("grid");
  for (const p of catalog.packs) {
    const el = document.createElement("div");
    el.className = "card";
    el.innerHTML = `<div class="title">${p.title}</div>
      <div>${(p.category||[]).map(c => `<span class="tag">${c}</span>`).join(" ")}</div>
      <div style="margin-top:.5rem; font-size:.9rem; color:#bdbdd0">Formats: ${(p.formats||[]).join(", ")}</div>
      <div style="margin-top:.25rem; font-size:.9rem; color:#bdbdd0">Declared value: $${p.value_usd}</div>`;
    grid.appendChild(el);
  }
}
main();
</script>
</body>
</html>
